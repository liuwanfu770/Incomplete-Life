<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>验证码模块(美化版)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>图形验证码</h1>
  <iframe id="captchaFrame" src="https://signalcaptchas.org/registration/generate" class="captcha-iframe"></iframe>
  <p class="note">完成验证后，会出现“打开Signal”链接。  
  右键复制该链接，从中提取signalcaptcha://后面的部分到注册模块中。</p>
</div>
</body>
</html>
