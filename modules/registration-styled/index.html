<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>注册模块(美化版)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>注册界面</h1>
  <div class="form-group">
    <label for="phone">手机号</label>
    <input id="phone" type="tel" placeholder="+123456789">
  </div>
  
  <div class="form-group">
    <label for="captchaToken">图形验证Token</label>
    <input id="captchaToken" type="text" placeholder="从验证码模块复制的Token">
  </div>
  
  <button id="registerBtn" class="btn">提交注册</button>
  
  <div class="form-group">
    <label for="smsCode">短信验证码</label>
    <input id="smsCode" type="text" placeholder="短信验证码">
  </div>
  
  <button id="verifyBtn" class="btn">验证短信</button>

  <div id="status" class="status-msg"></div>
</div>
<script src="registration.js"></script>
</body>
</html>
