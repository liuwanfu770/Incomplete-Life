<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>群发模块(美化版)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>群发界面</h1>
<input id="gacc" type="text" placeholder="使用账号(例如:+123456789)" class="input">
<textarea id="gmsg" placeholder="输入群发消息" class="textarea"></textarea>
<input id="grecs" type="text" placeholder="多个收件人用逗号分隔(例如:+111,+222)" class="input">
<button id="gsend" class="btn">群发</button>
<div id="gstatus" class="status-msg"></div>
</div>
<script src="group-send.js"></script>
</body>
</html>
